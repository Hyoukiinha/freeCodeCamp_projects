<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="title">freeCodeCamp Survey Form</h1>
    <p id="description">Thank you for taking the time to help us improve the platform</p>

    <form id="survey-form">
        <fieldset>
            <label for="name">Name<input type="text" name="name" id="name" placeholder="Enter your name" required></label>
            <label for="email">Email<input type="email" name="email" id="email" placeholder="Enter your email"></label>
            <label for="age">Age (Optional)<input type="number" name="age" id="age" placeholder="Age"></label>
            <label for="describe">Which option best describes your current role?
                <select name="describe" id="describe">
                    <option value="0" checked>Select current role</option>
                    <option value="1">Student</option>
                    <option value="2">Full Time Job</option>
                    <option value="3">Full Time Learner</option>
                    <option value="4">Prefer not to say</option>
                    <option value="5">Other</option>
                </select>
            </label>
            <p>Would you recommend freeCodeCamp to a friend?</p>
            <label for="definitely"><input type="radio" name="recommend" id="definitely">Definitely</label>
            <label for="maybe"><input type="radio" name="recommend" id="maybe">Maybe</label>
            <label for="nosure"><input type="radio" name="recommend" id="nosure">Not Sure</label>
            <label for="favorite">
                <select name="favorite" id="favorite">
                    <option value="0">Select an option</option>
                    <option value="c">Challenges</option>
                    <option value="p">Projects</option>
                    <option value="co">Community</option>
                    <option value="o">Open source</option>
                </select>
            </label>
            <p>What would you like to see improved? (Check all that apply)</p>
            <label for="frontend"><input type="checkbox" name="frontend" id="frontend">Front-end Projects
</label>
            <label for="backend"><input type="checkbox" name="backend" id="backend">Back-end Projects</label>
            <label for="data"><input type="checkbox" name="data" id="data">Data Visualization
</label>
            <label for="challenges"><input type="checkbox" name="challenges" id="challenges">Challenges</label>
            <label for="opsource"><input type="checkbox" name="opsource" id="opsource">Open Source Community</label>
            <label for="help"><input type="checkbox" name="help" id="help">Gitter help rooms
</label>
            <label for="videos"><input type="checkbox" name="videos" id="videos">Videos</label>
            <label for="meetups"><input type="checkbox" name="meetups" id="meetups">City Meetups</label>
            <label for="wiki"><input type="checkbox" name="wiki" id="wiki">Wiki</label>
            <label for="forum"><input type="checkbox" name="forum" id="forum">Forum</label>
            <label for="addcourse"><input type="checkbox" name="addcourse" id="addcourse">Additional Courses</label>

            <label for="comment"><textarea name="comment" id="comment" placeholder="Enter your comment here..."></textarea>Any comments or suggestions?</label>
            <label for="submit"><input type="submit" id="submit" name="submit"></label>
        </fieldset>
    </form>
</body>
</html>
